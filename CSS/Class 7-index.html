<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Introduction</title>
    <style>
      .header {
        background-color: lightblue;
        padding: 10px;
        text-align: center;
      }

      .menu {
        background-color: lightgreen;
        padding: 10px;
        text-align: center;
      }

      .content {
        background-color: lightyellow;
        padding: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Part 1 - Methods for Applying CSS -->

    <!-- Part 2 - Difference Between Table Based and Div Based Conversion -->

    <!-- Pehle (15-20 saal pehle)
      Log websites tables se banate the.
     Aur Sab Div aur CSS use karte hain.     -->

    <table border="1">
      <tr>
        <td>Logo</td>
        <td>Menu</td>
      </tr>

      <tr>
        <td colspan="2">Content</td>
      </tr>
    </table>

    <!-- Pehle developers website ka layout table se banate the.
    Jaise Excel Sheet.
    Har cheez rows aur columns me. -->

    <!-- div based layout  -->

    <div class="header">Logo</div>

    <div class="menu">Menu</div>

    <div class="content">Content</div>

    <!-- Ab layout Div aur CSS se banta hai. Ye flexible hai. Responsive hai. Easy
    hai. -->

    <!-- Tables are used to display data, while Divs are used to create the layout of a webpage. -->

    <!-- Aaj ke modern web development me sirf <div> hi nahi, balki
    Semantic HTML tags (<header>, <nav>, <section>, <article>, <footer>) ke sath 
    CSS use ki jati hai. -->
  </body>
</html>
