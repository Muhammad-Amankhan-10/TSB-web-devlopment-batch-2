<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Tags</title>
  </head>
  <body>
    <!-- Left Align  by default -->
    <img src="student.jpg" width="200" />

    <!-- Center Align -->
    <div style="text-align: center">
      <img src="student.jpg" width="200" />

      <!-- Right Align -->
      <div style="text-align: right">
        <img src="student.jpg" width="200" />
      </div>
    </div>
  </body>
</html>
