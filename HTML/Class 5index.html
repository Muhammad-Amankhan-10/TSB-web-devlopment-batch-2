<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Basics class 5</title>
</head>
<body>
     <!-- TABLE -->

    <!--
    Table ka use data ko rows aur columns me show karne ke liye hota hai.

    table = complete table
    tr = table row
    th = table heading
    td = table data
    -->


    <table border="1">

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Class</th>
        </tr>


        <tr>
            <td>Ali</td>
            <td>15</td>
            <td>9th</td>
        </tr>


        <tr>
            <td>Ahmed</td>
            <td>16</td>
            <td>10th</td>
        </tr>

    </table>



    <!-- TABLE ATTRIBUTES -->

    <!--
    colspan:
    Columns ko merge karta hai.

    rowspan:
    Rows ko merge karta hai.
    -->


    <table border="1">

        <tr>

            <th colspan="2">
                Student Information
            </th>

        </tr>

        <tr>

            <td>Name</td>
            <td>Ali</td>

        </tr>

        <tr>
            <td rowspan="2">
                Subjects
            </td>
             <td>HTML</td>    
        </tr>

        <tr>

            <td>CSS</td>

        </tr>
    </table>

</body>
</html>
