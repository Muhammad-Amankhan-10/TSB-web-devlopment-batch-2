<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Basics class 4</title>
</head>
<body>
    
<!--    
        SEMANTIC HTML
        Semantic HTML ka matlab hai ki HTML tags ka use unke meaning ke hisaab se
                                                -->

<!-- Header website ka top part hota hai.

Isme ho sakta hai
Logo, Website Name, Search Bar, Login Button -->

<header>

<h1>ABC School</h1>

</header>

<!-- Nav ka matlab Navigation
Yani
Website me idhar se udhar jana. RAsta dekhana 

Home, About, Gallery, Contact -->

<nav>

<a href="">Home</a>

<a href="">About</a>

<a href="">Contact</a>

</nav>

<!-- Section website ka ek part hota hai.
Website me multiple sections ho sakte hain.

Example
About Us, Services, Gallery, Contact -->

<section>

<h2>HTML Course</h2>

<p>Welcome Students</p>

</section>

<!-- Article independent content hota hai.
Agar is article ko website se hata bhi do to bhi uska meaning complete rehta hai.

Examples
News, Blog, Story, Product, Review -->

<article>

<h3>Latest News</h3>

<p>HTML Classes Started.</p>

</article>

<!-- Aside extra information hoti hai.
Example
Ads Related Posts ,Recent News, Categories Facebook ki right side suggestions,
 YouTube ki recommended videos -->

<aside>

Advertisement Here

</aside>

<!-- Footer website ka last part hota hai.
Isme Contact Email Social Links Copyright Privacy Policy -->

<footer>

Copyright © 2026

</footer>

<!-- Agar ek main heading aur uski sub heading ko group karna ho -->
 <!-- Yeh tag modern HTML me practically obsolete hai 
 aur aaj kal real projects me bahut kam ya bilkul use nahi hota. -->

<hgroup>

<h1>HTML Course</h1>

<h2>Learn HTML in Urdu</h2>

</hgroup>

</body>
</html>
